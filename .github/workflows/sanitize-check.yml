name: Sanitize Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sanitize:
    name: Scan for sensitive data leaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history pra log scanning futuro

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sanitize-check
        run: node scripts/sanitize-check.js --severity medium

      - name: Comment on PR if failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **Sanitize check failed** — sensitive data detected in this PR.\n\nRun locally:\n```\nnode scripts/sanitize-check.js\n```\n\nFix the matches or add exclusions to `.sanitize-patterns.yaml` before merging.\n\nSee `docs/extraction-workflow.md` for the full playbook.'
            })
