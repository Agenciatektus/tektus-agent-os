name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skills + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate skills frontmatter
        run: node scripts/validate-skills.js

      - name: Sync IDE adapters (dry-run)
        run: node scripts/sync-ide.js --dry-run

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "README.md docs/**/*.md core/**/*.md"
          config: ".markdownlint.json"
        continue-on-error: true   # warn-only for now

  secrets-scan:
    name: Gitleaks — secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  link-check:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --include-fragments --exclude-mail "README.md" "docs/**/*.md"
        continue-on-error: true   # warn-only for now
