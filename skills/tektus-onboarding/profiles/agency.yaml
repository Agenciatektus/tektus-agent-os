name: agency
description: Marketing agency operations — content production, copy, brand, multi-client.

triggers:
  use_case: agency
  typical_languages: [pt-br, en, es]

squads_to_install:
  - pools/content-production
  - pools/content-publish
  - pools/content-calendar
  - pools/copy-squad-pool
  - pools/copy-project
  - pools/copy-review
  - pools/brand-creation
  - pools/brand-narrative
  - pools/brand-pool
  - pools/storytelling-pool
  - pools/design-pool
  - c-level/cmo
  - c-level/cgo
  - internal/cyber-security  # always-on for compliance

skills_to_activate:
  - marketing-expert
  - humanizer  # if pt-br
  - template-designer
  - image-creator
  - image-fetcher
  - image-ai-generator
  - instagram-publisher
  - blotato
  - canva
  - resend
  - apify

best_practices_to_load:
