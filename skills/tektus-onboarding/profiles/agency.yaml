  - strategist
  - instagram-feed
  - instagram-reels
  - instagram-stories
  - linkedin-post
  - email-newsletter
  - email-sales
  - blog-post
  - blog-seo

starter_prompts_pt_br:
  - 'Faça um plano editorial de 30 dias para Instagram do cliente X (nicho: <setor>).'
  - 'Escreva 3 variações de copy para anúncio Meta com foco em conversão.'
  - 'Revise este briefing do cliente e identifique gaps antes de iniciarmos.'

starter_prompts_en:
  - "Plan a 30-day Instagram editorial calendar for client X (niche: <industry>)."
  - "Write 3 ad copy variations for a Meta campaign focused on conversion."
  - "Review this client brief and flag gaps before we start."
