# Best Practices Catalog
# The Architect reads this file to discover which best-practices are available.
# Read the full file only for best-practices relevant to the squad being created.

catalog:
  # === Discipline Best Practices ===
  - id: copywriting
    name: "Copywriting & Persuasive Writing"
    whenToUse: "Creating agents that write persuasive copy, hooks, CTAs, social media captions, sales content, or viral angles."
    file: copywriting.md

  - id: researching
    name: "Research & Data Collection"
    whenToUse: "Creating agents that research topics, collect data from the web, verify facts, or produce structured research briefs."
    file: researching.md

  - id: audience-research
    name: "Audience Research — Persona, ICP & Jobs-to-be-Done"
    whenToUse: "Creating agents that research audiences, define personas, build ICPs or map JTBD. Use BEFORE strategy or content production. NOT for generic data collection (use researching) nor strategic positioning (use strategist)."
    file: audience-research.md

  - id: ad-creative
    name: "Ad Creative — Hooks, Body & Variation Architecture"
    whenToUse: "Creating agents that produce paid-ads creatives (Meta, Google, TikTok). Optimized for modern algorithmic auctions where creative IS targeting. NOT for organic posts (use platform BPs) nor long-form copy (use copywriting). Last updated 2026-04-27 (v1.1.0 — Hook Rate / Hold Rate / Thumbstop benchmarks, Trope Stacking, VEO)."
    file: ad-creative.md

  - id: paid-launch
    name: "Paid Launch — Framework end-to-end de campanha de tráfego"
    whenToUse: "Creating agents that plan, launch and operate paid traffic campaigns end-to-end. From brief to upload to learning-phase to scale/kill. NOT for organic strategy (use strategist) nor existing-account audit (use squad traffic-audit). Last updated 2026-04-27 (v1.1.0 — cross-references to platform-specific 2026 BPs)."
    file: paid-launch.md

  - id: pixel-setup
    name: "Pixel Setup — Tracking server-side completo"
    whenToUse: "Creating agents that set up tracking infrastructure (Meta CAPI, Google Tag, GA4, GTM Server-Side). Must be done BEFORE any paid traffic spend. NOT for GA4 reports (use data-analysis) nor attribution modeling (use squad traffic-analytics). Last updated 2026-04-27 (v1.1.0 — Event ID + EMQ + Enhanced Conversions Unified)."
    file: pixel-setup.md

  - id: meta-ads-2026
    name: "Meta Ads 2026 — Andromeda · Lattice · Muse Spark"
    whenToUse: "Creating agents that plan, execute, optimize, or audit Meta Ads campaigns (Facebook + Instagram). Covers campaign architecture (3-1-Many model), CBO + Advantage+ Audience, funnel staging (TOFU/MOFU/BOFU/SAZONAL), KPIs (Hook Rate, Hold Rate, Thumbstop, EMQ, Frequency), CAPI + Event ID, and the seven-day learning rule. NOT for: creative production criteria → see creative-direction-meta-2026. NOT for: end-to-end multi-channel framework → see paid-launch. Last updated 2026-04-27."
    file: meta-ads-2026.md

  - id: creative-direction-meta-2026
    name: "Creative Direction — Meta Ads 2026"
    whenToUse: "Creating agents that direct, brief, produce, or audit creative pieces (Reels, static, carousel) specifically for paid Meta Ads in 2026. Covers VEO (Visual Entity Optimization), Trope Stacking, Hook Rate / Hold Rate / Thumbstop targets, UGC vs polished trade-off, OCR text limit, Reels-first thinking, Andromeda Entity ID diversity rule. NOT for: campaign architecture → see meta-ads-2026. NOT for: generic ad-creative variation grid → see ad-creative. Last updated 2026-04-27."
    file: creative-direction-meta-2026.md

  - id: google-ads-2026
    name: "Google Ads 2026 — Gemini 3 · Power Pack · Comércio Agêntico"
    whenToUse: "Creating agents that plan, execute, optimize, or audit Google Ads campaigns. Covers Power Pack framework (Demand Gen + AI Max + Performance Max), AI Overviews impact on CTR, agentic commerce (ALF + UCP), Enhanced Conversions unification (deadline 18/08/2026), signal purification, broad match + smart bidding patterns, and creative production with Asset Studio (Imagen 4, Veo 3, Nano Banana 4). NOT for: Meta Ads → see meta-ads-2026. NOT for: SEO orgânico → see strategist or technical-writing. Last updated 2026-04-27."
    file: google-ads-2026.md

  - id: review
    name: "Content Review & Quality Control"
    whenToUse: "Creating agents that evaluate content quality, score against criteria, or produce structured APPROVE/REJECT verdicts."
    file: review.md

  - id: image-design
    name: "Visual Design & Image Creation"
    whenToUse: "Creating agents that design graphics, carousel slides, social media visuals, or HTML/CSS templates for rendering."
    file: image-design.md

  - id: social-networks-publishing
    name: "Social Networks Publishing"
    whenToUse: "Creating agents that publish content to Instagram, LinkedIn, X/Twitter, YouTube, or other social platforms."
    file: social-networks-publishing.md

  - id: strategist
    name: "Strategy & Editorial Planning"
    whenToUse: "Creating agents that plan content strategy, editorial calendars, competitive positioning, or audience segmentation."
    file: strategist.md

  - id: technical-writing
    name: "Technical & Long-Form Writing"
    whenToUse: "Creating agents that write articles, blog posts, documentation, tutorials, white papers, or educational content."
    file: technical-writing.md

  - id: data-analysis
    name: "Data Analysis & Interpretation"
    whenToUse: "Creating agents that interpret metrics, extract insights, benchmark performance, or produce analytical reports."
    file: data-analysis.md

  - id: secure-coding
    name: "Secure Coding & Application Security"
    whenToUse: "Creating agents that write, review, or audit application code for security (vibecoded PRs, PHP/WordPress, Node/React, Edge Functions Supabase, payment gateways, webhooks). NOT for infra hardening or pentest."
    file: secure-coding.md

